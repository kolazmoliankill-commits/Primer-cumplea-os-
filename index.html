<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cita con Jaider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #000; color: white; overflow: hidden; }
        .bg-image { position: absolute; inset: 0; background-size: cover; background-position: center; transition: all 1s ease; filter: brightness(0.6); }
        .choice-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); transition: 0.3s; }
        .choice-btn:hover { background: white; color: black; transform: scale(1.05); }
        .ui-layer { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; padding: 2rem; }
    </style>
</head>
<body>

    <div id="bg" class="bg-image" style="background-image: url('foto_inicio.jpg');"></div>

    <div class="fixed top-8 left-0 w-full px-8 z-50">
        <div class="flex items-center gap-3">
            <span class="text-pink-500">❤️</span>
            <div class="h-2 flex-1 bg-gray-800 rounded-full overflow-hidden">
                <div id="progress" class="h-full bg-pink-500 transition-all duration-500" style="width: 10%;"></div>
            </div>
        </div>
    </div>

    <div class="ui-layer">
        <div id="dialogue-box" class="mb-8 max-w-lg">
            <h2 id="name-tag" class="text-pink-500 font-bold tracking-widest text-sm mb-2 uppercase">Jaider</h2>
            <p id="text-box" class="text-xl md:text-2xl font-light leading-tight italic">
                "Hola Yoselin... Estaba esperando que llegaras. ¿Lista para nuestra cita?"
            </p>
        </div>

        <div id="options-container" class="flex flex-col gap-3 mb-10">
            <button onclick="nextStep(1)" class="choice-btn p-4 rounded-xl text-left font-semibold">"¡Claro que sí! Vamos."</button>
            <button onclick="nextStep(1)" class="choice-btn p-4 rounded-xl text-left font-semibold">"Depende... ¿qué tienes planeado?"</button>
        </div>
    </div>

    <script>
        const story = {
            0: {
                text: "Hola Yoselin... Estaba esperando que llegaras. ¿Lista para nuestra cita?",
                options: [
                    { t: "¡Claro que sí! Vamos.", next: 1, prog: 20 },
                    { t: "Depende... ¿qué tienes planeado?", next: 1, prog: 25 }
                ],
                img: "foto_inicio.jpg" // CAMBIA POR TU FOTO 1
            },
            1: {
                text: "Tengo dos planes en mente. Tú eliges: ¿Algo tranquilo para hablar o algo con más adrenalina?",
                options: [
                    { t: "Un café y charla tranquila.", next: 2, prog: 50 },
                    { t: "¡Adrenalina! Vamos a rodar en la moto.", next: 3, prog: 60 }
                ],
                img: "foto_opciones.jpg" // CAMBIA POR TU FOTO 2
            },
            2: { // Ruta Tranquila
                text: "Buena elección. Me encanta escucharte hablar... por cierto, te ves increíble hoy.",
                options: [
                    { t: "Tú tampoco te quedas atrás...", next: 4, prog: 80 },
                    { t: "Sonreír tímidamente", next: 4, prog: 90 }
                ],
                img: "foto_cafe.jpg" // CAMBIA POR TU FOTO 3 (Casual)
            },
            3: { // Ruta Adrenalina
                text: "¡Esa es la actitud! Agárrate fuerte de mí, que hoy el camino es nuestro.",
                options: [
                    { t: "Abrazarte fuerte", next: 4, prog: 100 },
                    { t: "¡Dale gas!", next: 4, prog: 90 }
                ],
                img: "foto_moto.jpg" // CAMBIA POR TU FOTO 3 (En moto o movida)
            },
            4: {
                text: "Ha sido un día perfecto, Yoselin. Gracias por ser mi mejor compañía. ¿Repetimos?",
                options: [
                    { t: "Finalizar Experiencia ❤️", next: 5, prog: 100 }
                ],
                img: "foto_final.jpg" // CAMBIA POR TU FOTO 4 (La mejor)
            }
        };

        function nextStep(id) {
            const step = story[id];
            if(!step) return showFinal();

            // Animación de salida
            gsap.to(".ui-layer", { opacity: 0, y: 20, duration: 0.5, onComplete: () => {
                // Actualizar Contenido
                document.getElementById("text-box").innerText = `"${step.text}"`;
                document.getElementById("bg").style.backgroundImage = `url('${step.img}')`;
                
                const container = document.getElementById("options-container");
                container.innerHTML = "";
                step.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "choice-btn p-4 rounded-xl text-left font-semibold";
                    btn.innerText = opt.t;
                    btn.onclick = () => {
                        updateProgress(opt.prog);
                        nextStep(opt.next);
                    };
                    container.appendChild(btn);
                });

                // Animación de entrada
                gsap.to(".ui-layer", { opacity: 1, y: 0, duration: 0.5 });
            }});
        }

        function updateProgress(val) {
            document.getElementById("progress").style.width = val + "%";
        }

        function showFinal() {
            document.body.innerHTML = `
                <div class="h-screen flex items-center justify-center bg-black p-10 text-center">
                    <div>
                        <h1 class="text-5xl font-black text-pink-500 mb-6 italic">MATCH PERFECTO</h1>
                        <p class="text-xl text-gray-300">Yoselin, has desbloqueado el final verdadero. <br> "Eres la persona con la que quiero seguir subiendo de nivel."</p>
                        <br><br>
                        <p class="text-sm text-gray-600 font-mono">CON AMOR: JAIDER</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
